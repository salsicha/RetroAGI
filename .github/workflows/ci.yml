name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install formatter
        run: python -m pip install black==26.5.1

      - name: Check changed Python formatting
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -z "${BASE_SHA}" ] || printf '%s' "${BASE_SHA}" | grep -Eq '^0+$'; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi
          PYTHON_FILES="$(git diff --name-only --diff-filter=ACMRT "${BASE_SHA}" HEAD -- '*.py')"
          if [ -z "${PYTHON_FILES}" ]; then
            echo "No changed Python files to format-check."
          else
            python -m black --check ${PYTHON_FILES}
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install linter
        run: python -m pip install ruff==0.15.17

      - name: Lint changed Python files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -z "${BASE_SHA}" ] || printf '%s' "${BASE_SHA}" | grep -Eq '^0+$'; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi
          PYTHON_FILES="$(git diff --name-only --diff-filter=ACMRT "${BASE_SHA}" HEAD -- '*.py')"
          if [ -z "${PYTHON_FILES}" ]; then
            echo "No changed Python files to lint."
          else
            python -m ruff check ${PYTHON_FILES}
          fi

  unit-tests:
    name: Unit Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU PyTorch
        run: >
          python -m pip install
          torch==2.9.1
          torchvision==0.24.1
          --index-url https://download.pytorch.org/whl/cpu

      - name: Install test dependencies
        run: python -m pip install ".[test,vision]"

      - name: Run unit tests
        run: python -m unittest discover -s scripts/tests -v

  cpu-smoke-training:
    name: CPU Smoke Training
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install CPU PyTorch
        run: >
          python -m pip install
          torch==2.9.1
          torchvision==0.24.1
          --index-url https://download.pytorch.org/whl/cpu

      - name: Install smoke dependencies
        run: python -m pip install ".[test,vision]"

      - name: Run tiny Block SMB CPU training
        run: >
          timeout 180s retroagi train --stage block-smb
          --epochs 1
          --episodes-per-epoch 1
          --rollout-steps 2
          --fixed-scenario level_1_flat.json
          --generated-scenarios 0
          --evaluation-episodes 1
          --evaluation-max-steps 2
          --evaluation-interval-epochs 1
          --hidden-dim 8
          --device cpu
          --disable-checkpoint-transfer
          --output artifacts/ci/block_smb_smoke.json
          --log-path artifacts/ci/block_smb_smoke.jsonl

      - name: Run tiny Full SMB CPU smoke tests
        run: python -m unittest scripts.tests.test_full_smb_cpu_smoke -v

  architecture-promotion-fixture:
    name: Architecture Promotion Fixture
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install CPU PyTorch
        run: >
          python -m pip install
          torch==2.9.1
          torchvision==0.24.1
          --index-url https://download.pytorch.org/whl/cpu

      - name: Install promotion dependencies
        run: python -m pip install ".[test,vision]"

      - name: Run baseline architecture promotion fixture
        run: >
          timeout 120s retroagi promote
          --rung interface-smoke
          --output artifacts/ci/promotion_baseline_interface.json
          --artifacts-dir artifacts/ci/promotion_baseline
          --device cpu
          --architecture baseline
          --architecture-config hidden_dim=8
          --interface-batch-size 1

      - name: Verify baseline promotion manifest
        run: |
          test -s artifacts/ci/promotion_baseline_interface.json
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("artifacts/ci/promotion_baseline_interface.json").read_text())
          assert manifest["passed"] is True
          assert manifest["architecture"]["name"] == "agent_world_model_critic"
          assert manifest["architecture"]["config"] == {"hidden_dim": 8}
          assert [rung["name"] for rung in manifest["rungs"]] == ["interface-smoke"]
          assert manifest["rungs"][0]["status"] == "passed"
          assert {stage["stage"] for stage in manifest["rungs"][0]["stages"]} == {
              "synthetic_1d",
              "block_smb",
              "full_smb",
          }
          PY
